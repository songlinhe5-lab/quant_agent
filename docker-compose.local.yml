# ==========================================
# 本地开发: 所有服务同时运行
# ==========================================
# 用法:
#   docker compose -f docker-compose.local.yml up -d
#
# 此文件为本地开发环境提供完整的独立部署配置，
# 所有服务运行在同一 Docker 网络中。
# ==========================================

services:
  # ==========================================
  # 基础设施层
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: quant_local_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-quant_local_dev}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-quant_local_dev}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - quant-local

  postgres:
    image: pgvector/pgvector:pg15
    container_name: quant_local_postgres
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-quant_admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-quant_pg_dev}
      - POSTGRES_DB=${DB_NAME:-quant_agent_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-quant_admin} -d ${DB_NAME:-quant_agent_db}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - quant-local

  # ==========================================
  # 应用层
  # ==========================================
  quant-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quant_local_app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 1 --loop uvloop --http httptools
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-quant_local_dev}
      - QUANT_ENV=development
      - COLLECTOR_AKSHARE=true
      - COLLECTOR_YFINANCE=true
      - DATABASE_URL=postgresql://${DB_USER:-quant_admin}:${DB_PASSWORD:-quant_pg_dev}@postgres:5432/${DB_NAME:-quant_agent_db}
    volumes:
      - ./backend:/app/backend
      - quant_db:/app/backend/data
      - ./reports:/app/reports
    networks:
      - quant-local

  quant-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quant_local_worker
    command: python backend/worker.py
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-quant_local_dev}
      - QUANT_ENV=development
      - COLLECTOR_AKSHARE=true
      - COLLECTOR_YFINANCE=true
      - DATABASE_URL=postgresql://${DB_USER:-quant_admin}:${DB_PASSWORD:-quant_pg_dev}@postgres:5432/${DB_NAME:-quant_agent_db}
    volumes:
      - ./backend:/app/backend
      - quant_db:/app/backend/data
    networks:
      - quant-local


networks:
  quant-local:
    name: quant_local_net
    driver: bridge

volumes:
  redis_data:
    name: quant_local_redis_data
  postgres_data:
    name: quant_local_postgres_data
  quant_db:
    name: quant_local_sqlite_data

