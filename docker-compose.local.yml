# ==========================================
# 本地开发: Master + Slave 同时运行
# ==========================================
# 用法:
#   docker compose -f docker-compose.local.yml up -d
#
# 此文件在 docker-compose.yml 基础上叠加一个 slave-collector，
# 使 master 和 slave 在同一 Docker 网络中通信。
#
# Master Redis 地址: redis:6379 (Docker 内部)
# Slave 通过 MASTER_NODES 注册到 Master 的 Redis
# Master ClusterManager 通过 slave-collector:8001 调用 Slave
# ==========================================

services:
  # ==========================================
  # 基础设施层 (本地 master)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: quant_local_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-quant_local_dev}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-quant_local_dev}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - quant-local

  postgres:
    image: pgvector/pgvector:pg15
    container_name: quant_local_postgres
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-quant_admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-quant_pg_dev}
      - POSTGRES_DB=${DB_NAME:-quant_agent_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-quant_admin} -d ${DB_NAME:-quant_agent_db}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - quant-local

  # ==========================================
  # 应用层 (本地 master)
  # ==========================================
  quant-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quant_local_app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 1 --loop uvloop --http httptools --reload
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-quant_local_dev}
      - QUANT_ENV=development
      - NODE_ROLE=master
      - COLLECTOR_AKSHARE=true
      - COLLECTOR_YFINANCE=true
      - DATABASE_URL=postgresql://${DB_USER:-quant_admin}:${DB_PASSWORD:-quant_pg_dev}@postgres:5432/${DB_NAME:-quant_agent_db}
      # 静态从节点 (冷启动兜底，运行时通过 Redis 自动发现)
      - SLAVE_NODES=http://slave-collector:8001
    volumes:
      - ./backend:/app/backend
      - quant_db:/app/backend/data
      - ./reports:/app/reports
    networks:
      - quant-local

  quant-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quant_local_worker
    command: python backend/worker.py
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-quant_local_dev}
      - QUANT_ENV=development
      - NODE_ROLE=master
      - COLLECTOR_AKSHARE=true
      - COLLECTOR_YFINANCE=true
      - DATABASE_URL=postgresql://${DB_USER:-quant_admin}:${DB_PASSWORD:-quant_pg_dev}@postgres:5432/${DB_NAME:-quant_agent_db}
    volumes:
      - ./backend:/app/backend
      - quant_db:/app/backend/data
    networks:
      - quant-local

  # ==========================================
  # 从节点采集器 (本地 slave)
  # ==========================================
  slave-collector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quant_local_slave
    command: uvicorn backend.slave_app:app --host 0.0.0.0 --port 8001 --loop uvloop --http httptools --reload
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - QUANT_ENV=development
      - NODE_ROLE=slave
      - SLAVE_ID=local-slave-1
      - NODE_HOST=slave-collector
      - NODE_PORT=8001
      # 注册到本地 master 的 Redis
      - MASTER_NODES=[{"id":"local-master","host":"redis","port":6379,"password":"${REDIS_PASSWORD:-quant_local_dev}"}]
      # 启用 yfinance 采集器用于测试
      - COLLECTOR_YFINANCE=true
      - COLLECTOR_FINNHUB=false
      - COLLECTOR_FUTU=false
      - COLLECTOR_AKSHARE=false
    volumes:
      - ./backend:/app/backend
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quant-local


networks:
  quant-local:
    name: quant_local_net
    driver: bridge

volumes:
  redis_data:
    name: quant_local_redis_data
  postgres_data:
    name: quant_local_postgres_data
  quant_db:
    name: quant_local_sqlite_data
