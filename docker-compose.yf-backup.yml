# ==========================================
# Quant Agent - 海外备用节点配置 (YFinance Backup Node)
# ==========================================
# 定位: YFinance 备用节点，当主节点被 Yahoo 限流时自动切换
# 包含: 仅 quant-agent（无 Redis/PG，无 Worker，无监控）
# 数据源: YFinance(本地)
#
# 启动: docker-compose -f docker-compose.yf-backup.yml up -d
#
# 注意:
#   1. 此节点不对外提供业务 API，仅作为数据源代理
#   2. 必须配置 DATA_SOURCE_HMAC_SECRET 与主节点一致
#   3. 建议通过 Tailscale 组网，不暴露公网 8000 端口
# ==========================================

services:
  yf-backup-agent:
    image: ghcr.io/songlinhe5-lab/quant-agent:latest
    pull_policy: missing
    container_name: quant_yf_backup
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 1 --loop uvloop --http httptools --timeout-keep-alive 65 --limit-concurrency 5000 --no-access-log
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QUANT_ENV=production
      - OTEL_ENABLED=false
      - COLLECTOR_FUTU=false
      - COLLECTOR_YFINANCE=true
      - COLLECTOR_FINNHUB=false
      - COLLECTOR_AKSHARE=false
      - DATA_SOURCE_ROUTER_ENABLED=false
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ./reports:/app/reports
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
    networks:
      - quant-internal

networks:
  quant-internal:
    driver: bridge
