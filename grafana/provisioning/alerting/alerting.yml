# Grafana Alerting Provisioning - 飞书 Webhook 告警通知
# 文档: https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting-resources/file-provisioning/
#
# ⚠️ 注意: Grafana 9.5.x provisioning 文件不支持 ${VAR} 环境变量替换
# 部署后请通过 Grafana UI (Alerting → Contact Points) 修改为真实的飞书 Webhook URL
# 或通过 GF_ALERTING 环境变量覆盖 (需 Grafana 10+)

apiVersion: 1

contactPoints:
  - orgId: 1
    name: feishu-alerts
    receivers:
      - uid: feishu-webhook-1
        type: webhook
        settings:
          url: "https://open.feishu.cn/open-apis/bot/v2/hook/576d1283-156d-4eed-bf25-d3caa2d2a8d9"
          httpMethod: POST
          # 飞书 Webhook 需要 msg_type=text 格式
          # Grafana webhook 默认发送 alert payload, 需要通过自定义模板转换
          maxAlerts: "5"
        secureSettings:
          # 如果飞书机器人开启了签名校验, 在此配置 secret
          # Grafana 会加密存储, 不会出现在日志中
          # authorization: ""  # 如需飞书签名校验, 通过 Grafana UI 配置

  # 备用: 日志记录 (用于 Warning 级别, 不推送外部通知)
  - orgId: 1
    name: log-only
    receivers:
      - uid: log-receiver-1
        type: webhook
        settings:
          url: "http://localhost:3000/api/v1/grafana_oncall_stub"
          httpMethod: POST

policies:
  - orgId: 1
    receiver: feishu-alerts
    group_by:
      - grafana_folder
      - alertname
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # Critical 级别: 飞书推送 + 日志
      - receiver: feishu-alerts
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 1h
      # Warning 级别: 仅飞书推送, 降低频率
      - receiver: feishu-alerts
        matchers:
          - severity = warning
        group_wait: 1m
        repeat_interval: 4h

groups:
  - orgId: 1
    name: quant-agent-alerts
    folder: Quant Agent
    interval: 1m
    rules:
      # Futu 连接状态
      - uid: futu-disconnected
        title: Futu OpenD 连接断开
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: futu_connected
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Futu OpenD 连接断开"
          description: "Futu OpenD 连接状态为 0 持续超过 30 秒，交易网关不可用"

      # API P95 延迟
      - uid: api-latency-high
        title: API P95 延迟过高
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: histogram_quantile(0.95, sum(rate(fastapi_request_duration_seconds_bucket[5m])) by (le))
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [2]
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API P95 延迟超过 2000ms"
          description: "当前 P95 延迟: {{ $values.C.Value }}s，请检查后端服务性能"

      # Redis 内存使用
      - uid: redis-memory-high
        title: Redis 内存使用率过高
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: redis_memory_used_bytes / redis_memory_max_bytes * 100
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [80]
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Redis 内存使用率超过 80%"
          description: "当前使用率: {{ $values.C.Value }}%，建议清理过期 Key 或扩容"

      # 熔断器状态
      - uid: circuit-breaker-open
        title: 熔断器已打开
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: circuit_breaker_state{state="open"}
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 10s
        labels:
          severity: critical
        annotations:
          summary: "熔断器已打开: {{ $labels.service }}"
          description: "{{ $labels.service }} 的熔断器处于 open 状态，该服务已降级"

      # ─── RL-11: 数据源限流告警规则 ─────────────────────────────

      # 限流频率飙升: 5 分钟内限流触发 >10 次
      - uid: ds-rate-limit-spike
        title: 数据源限流频率飙升
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum by (source) (rate(ds_rate_limit_total[5m])) * 300
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [10]
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "数据源 {{ $labels.source }} 限流频率飙升"
          description: "过去 5 分钟内限流触发 {{ $values.C.Value }} 次 (>10)，请检查数据源配额或降低请求频率"

      # 长时间退避: 退避剩余时间 >2 分钟
      - uid: ds-long-backoff
        title: 数据源长时间退避
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: ds_rate_limit_throttled_seconds
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [120]
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "数据源 {{ $labels.source }} 退避时间过长"
          description: "当前退避剩余 {{ $values.C.Value }}s (>2min)，数据源可能已被长时间封禁"

      # 配额耗尽
      - uid: ds-quota-exhausted
        title: 数据源配额耗尽
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum by (source) (increase(ds_rate_limit_total{category="quota_exhausted"}[5m]))
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 10s
        labels:
          severity: critical
        annotations:
          summary: "数据源 {{ $labels.source }} 配额已耗尽"
          description: "过去 5 分钟内检测到 {{ $values.C.Value }} 次配额耗尽事件，请检查 API Key 配额或升级套餐"

      # IP 封禁
      - uid: ds-ip-blocked
        title: 数据源 IP 被封禁
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum by (source) (increase(ds_rate_limit_total{category="ip_blocked"}[5m]))
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 10s
        labels:
          severity: critical
        annotations:
          summary: "数据源 {{ $labels.source }} IP 被封禁"
          description: "过去 5 分钟内检测到 {{ $values.C.Value }} 次 IP 封禁事件，请立即检查 IP 状态并联系数据源解封"

      # DQ-04: 脏数据率超阈值（SVC-04 ALERT_DIRTY_RATE_THRESHOLD=5%）
      - uid: data-quality-dirty-rate-high
        title: 数据质量脏数据率过高
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: quant_data_quality_dirty_rate
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [0.05]
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "数据源 {{ $labels.source }} 脏数据率超过 5%"
          description: "SVC-04 校验脏数据率 {{ $values.A.Value }} 持续超过阈值，请检查字段完整性 / 价格跳变 / 时间戳新鲜度（看板 Data Quality DQ-04）"

      # ==========================================
      # DIST-21: 分布式节点告警
      # ==========================================

      # DIST-21a: 节点心跳超时 (dead)
      - uid: dist-node-heartbeat-dead
        title: 分布式节点心跳超时
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: time() - quant_dist_node_heartbeat_timestamp > 60
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [1]
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "节点 {{ $labels.node_id }} 心跳超时 (>60s)"
          description: "分布式节点 {{ $labels.node_id }} ({{ $labels.region }}) 已超过 60 秒未发送心跳，可能已断连"

      # DIST-21b: YF 存活节点 < 2
      - uid: dist-yf-nodes-low
        title: YF 存活节点不足 2 个
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: quant_dist_node_alive_count{capability="yfinance"} < 2
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "YF 存活节点不足 2 个"
          description: "当前 YF 存活节点数 {{ $values.A.Value }}，低于安全阈值 2，限流容灾能力下降"

      # DIST-21c: 所有 YF 节点宕机
      - uid: dist-yf-all-down
        title: 所有 YF 数据节点宕机
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: quant_dist_node_alive_count{capability="yfinance"} == 0
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "所有 YF 数据节点宕机!"
          description: "所有 YFinance 数据节点已宕机，YF 请求将全部降级到 STALE 缓存或返回错误"

      # DIST-21d: CN 节点断连
      - uid: dist-cn-node-down
        title: CN-AKShare 节点断连
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: quant_dist_node_status{node_id=~"cn-.*"} == 0
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "CN-AKShare 节点断连"
          description: "CN-AKShare 节点已断连，AKShare 数据将降级到 STALE 缓存（DIST-19）"

      # DIST-21e: STALE 降级频率过高
      - uid: dist-stale-fallback-high
        title: STALE 缓存降级频率过高
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: rate(quant_dist_yf_stale_fallback_total[5m]) + rate(quant_dist_ak_stale_fallback_total[5m]) > 0.1
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "STALE 缓存降级频率过高"
          description: "过去 5 分钟 STALE 缓存降级频率超过 0.1/s，数据新鲜度下降，请检查节点健康状态"
