global:
  scrape_interval: 15s # 每 15 秒抓取一次指标

scrape_configs:
  - job_name: 'fastapi-app'
    # 覆盖全局配置，针对 FastAPI 应用每 5 秒抓取一次，提高实时性
    scrape_interval: 5s
    basic_auth:
      username: 'admin'
      password: 'admin'
    static_configs:
      # 兼容全栈 Docker 与混合启动模式：同时尝试抓取容器内与宿主机的 8000 端口
      - targets: ['quant-agent:8000', 'host.docker.internal:8000']