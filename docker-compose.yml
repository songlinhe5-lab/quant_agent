# ==========================================
# Quant Agent - 统一 Compose (单文件多角色)
# ==========================================
# 通过 .env 中 COMPOSE_PROFILES 控制节点角色:
#
#   主节点 (API + 基础设施 + 可配置采集器):
#     COMPOSE_PROFILES=master
#     docker compose up -d
#
#   主节点 + 监控 (Prometheus + Grafana):
#     COMPOSE_PROFILES=master,monitoring
#     docker compose up -d
#
#   从节点 (轻量采集 API，连接主 Redis):
#     COMPOSE_PROFILES=slave
#     docker compose up -d
#
# 代码拉取到 VPS 后 docker compose build && docker compose up -d 即可。
# ==========================================

services:
  # ==========================================
  # 基础设施层 [master]
  # ==========================================
  redis:
    profiles: [master]
    image: redis:7-alpine
    container_name: quant_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-quant_redis_secret_2026}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-quant_redis_secret_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    networks:
      - quant-internal

  postgres:
    profiles: [master]
    image: pgvector/pgvector:pg15
    container_name: quant_postgres
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-quant_admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-quant_pg_secret_2026}
      - POSTGRES_DB=${DB_NAME:-quant_agent_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-quant_admin} -d ${DB_NAME:-quant_agent_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
    networks:
      - quant-internal

  # ==========================================
  # 应用层 [master]
  # ==========================================
  quant-agent:
    profiles: [master]
    image: ghcr.io/songlinhe5-lab/quant-agent:latest
    pull_policy: missing
    container_name: quant_app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 1 --loop uvloop --http httptools --timeout-keep-alive 65 --limit-concurrency 5000 --no-access-log
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUANT_ENV=production
      - OTEL_ENABLED=false
      - FUTU_ENABLED=false
      - DATABASE_URL=postgresql://${DB_USER:-quant_admin}:${DB_PASSWORD:-quant_pg_secret_2026}@postgres:5432/${DB_NAME:-quant_agent_db}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - quant_db:/app/backend/data
      - ./reports:/app/reports
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
    networks:
      - quant-internal

  quant-worker:
    profiles: [master]
    image: ghcr.io/songlinhe5-lab/quant-agent:latest
    pull_policy: missing
    container_name: quant_worker
    command: python backend/worker.py
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUANT_ENV=production
      - OTEL_ENABLED=false
      - FUTU_ENABLED=false
      - DATABASE_URL=postgresql://${DB_USER:-quant_admin}:${DB_PASSWORD:-quant_pg_secret_2026}@postgres:5432/${DB_NAME:-quant_agent_db}
    volumes:
      - quant_db:/app/backend/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
    networks:
      - quant-internal

  # ==========================================
  # 从节点采集 API [slave]
  # ==========================================
  slave-collector:
    profiles: [slave]
    image: ghcr.io/songlinhe5-lab/quant-agent:latest
    pull_policy: missing
    container_name: quant_slave
    command: uvicorn backend.slave_app:app --host 0.0.0.0 --port 8001 --loop uvloop --http httptools --timeout-keep-alive 65 --no-access-log
    restart: always
    ports:
      - "${NODE_PORT:-8001}:${NODE_PORT:-8001}"
    env_file:
      - .env
    environment:
      - QUANT_ENV=production
      - OTEL_ENABLED=false
      # 不设置 REDIS_HOST: slave 通过 MASTER_NODES 连接各 master 的 Redis
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${NODE_PORT:-8001}/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M

  # ==========================================
  # 监控层 [monitoring] (仅 master 可选)
  # ==========================================
  prometheus:
    profiles: [monitoring]
    image: prom/prometheus:v2.45.0
    container_name: quant_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - quant-internal

  grafana:
    profiles: [monitoring]
    image: grafana/grafana:9.5.3
    container_name: quant_grafana
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    networks:
      - quant-internal


networks:
  quant-internal:
    driver: bridge

volumes:
  redis_data:
    name: quant_redis_data
  quant_db:
    name: quant_sqlite_db
  postgres_data:
    name: quant_postgres_data
  prometheus_data:
    name: quant_prometheus_data
  grafana_data:
    name: quant_grafana_data
  hermes_data:
    name: quant_hermes_data
