# HTTP 自动跳转 HTTPS
server {
    listen 80;
    server_name quant.stephenhe.com; # 替换为你的真实域名

    # 允许 Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 服务
server {
    listen 443 ssl http2;
    server_name quant.yourdomain.com; # 替换为你的真实域名

    # SSL 证书配置 (这里假设你使用 Certbot 自动生成的证书路径)
    ssl_certificate /etc/letsencrypt/live/quant.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quant.yourdomain.com/privkey.pem;

    # SSL 优化配置 (生产级安全标准)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    # 全局代理头配置
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 1. 代理普通的 HTTP 请求 (包括 /, /monitor, /api, /assets)
    location / {
        # 指向本地 docker-compose 映射的 8000 端口
        proxy_pass http://127.0.0.1:8000;
        proxy_redirect off;
    }

    # 2. 专门代理 WebSocket 请求 (必须配置 Upgrade)
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        
        # WebSocket 核心配置
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 延长 WebSocket 的超时时间，防止空闲时被 Nginx 掐断 (量化行情必须项)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        
        # 关闭代理缓冲，确保行情 Tick 极速到达
        proxy_buffering off;
    }
}