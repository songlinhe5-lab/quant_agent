# Locust 压力测试配置 (TEST-03)
# 用法: locust -f scripts/locust_ws_stress.py --config scripts/locust.conf

# 默认目标（会被 --host 覆盖）
host = http://localhost:8000

# 用户数 & 孵化速率
users = 1000
spawn-rate = 10

# 测试持续时间
run-time = 60s

# 输出
csv = locust_report
html = locust_report.html

# 日志
loglevel = WARNING
logfile = locust.log
