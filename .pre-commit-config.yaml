# Pre-commit hooks 配置
# 安装: pip install pre-commit && pre-commit install

repos:
  # Python linting (后端)
  - repo: https://github.com/pycqa/ruff
    rev: v0.3.0
    hooks:
      - id: ruff
        files: ^backend/.*\.py$
        args: [--fix]

  # Python 测试 (后端)
  - repo: local
    hooks:
      - id: backend-tests
        name: Backend Tests
        entry: bash -c 'cd backend && python -m pytest tests/test_security.py -v'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

  # 前端测试
  - repo: local
    hooks:
      - id: frontend-tests
        name: Frontend Tests
        entry: bash -c 'cd frontend && pnpm run test 2>&1 || true'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

  # 通用检查
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=5000']
