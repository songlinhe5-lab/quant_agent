name: Data Subservice CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'data_subservice/**'
      - 'backend/core/service_registry.py'
      - 'backend/core/circuit_breaker.py'
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/songlinhe5-lab/quant-data-subservice
  UV_HTTP_TIMEOUT: 300

permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # Stage 1: CI Quality Gates
  # ==========================================
  lint:
    name: Lint data_subservice
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff lint
        run: uv run ruff check data_subservice/
      - name: Ruff format check
        run: uv run ruff format --check data_subservice/

  test:
    name: Test data_subservice
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run data_subservice tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          DS_NODE_ID: test-node
        run: |
          uv run pytest backend/tests/test_data_subservice*.py -v \
            --timeout=60 --tb=short || true

  # ==========================================
  # Stage 2: Build & Push to GHCR
  # ==========================================
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test]
    # 💡 develop 和 main push 时都构建镜像，方便提前验证
    if: |
      always() &&
      github.event_name == 'push' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./data_subservice/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # Stage 3: Deploy to YF Nodes (DIST-16)
  # ==========================================
  deploy-yf:
    name: Deploy to YF Node
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      always() &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       github.event_name == 'workflow_dispatch') &&
      needs.build.result == 'success'
    strategy:
      matrix:
        node: [yf-a, yf-b]
        include:
          - node: yf-a
            host_secret: VPS_S1_HOST
            ssh_key_secret: VPS_S1_SSH_KEY
            node_id: us-yf-a
          - node: yf-b
            host_secret: VPS_S2_HOST
            ssh_key_secret: VPS_S2_SSH_KEY
            node_id: us-yf-b
    steps:
      - uses: actions/checkout@v4

      - name: Set target image tag
        id: set_tag
        run: |
          TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying data-subservice tag: $TAG to ${{ matrix.node_id }}"

      - name: Prepare compose file (base64)
        id: prepare_compose
        run: |
          echo "compose_b64=$(base64 -w0 docker-compose.yf-node.yml)" >> $GITHUB_OUTPUT

      - name: Deploy to YF Node
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.VPS_S1_USER }}
          key: ${{ secrets[matrix.ssh_key_secret] }}
          envs: GITHUB_ACTOR
          command_timeout: 15m
          script: |
            set -e
            DEPLOY_PATH=/opt/quant-agent
            TARGET_TAG="${{ steps.set_tag.outputs.tag }}"

            mkdir -p $DEPLOY_PATH
            cd $DEPLOY_PATH

            # 更新 compose 文件
            echo '${{ steps.prepare_compose.outputs.compose_b64 }}' | base64 -d > docker-compose.yf-node.yml
            sed -i "s|ghcr.io/songlinhe5-lab/quant-data-subservice:.*|ghcr.io/songlinhe5-lab/quant-data-subservice:${TARGET_TAG}|g" docker-compose.yf-node.yml

            # 数据源配置统一走标准 .env（docker compose 自动加载，缺失则用 compose 默认值）
            if [ ! -f .env ]; then
              echo "WARN: .env 未找到，将使用 docker-compose.yf-node.yml 中的默认值 (REDIS_HOST=100.102.223.44, REDIS_PASSWORD=quant_redis_secret_2026)"
            fi

            # 拉取新镜像
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            docker pull ghcr.io/songlinhe5-lab/quant-data-subservice:${TARGET_TAG}

            # 启动服务
            NODE_ID=${{ matrix.node_id }} docker compose -f docker-compose.yf-node.yml up -d --remove-orphans

            # 健康检查
            for i in 1 2 3 4 5 6; do
              sleep 10
              HEALTH=$(curl -sf --max-time 10 http://localhost:8000/health 2>/dev/null || echo "UNHEALTHY")
              if echo "$HEALTH" | grep -q '"status":"healthy"'; then
                echo "Health check passed on attempt $i"
                break
              fi
              echo "Attempt $i/6 failed, retrying..."
              if [ "$i" = "6" ]; then
                echo "Health check FAILED after 6 attempts"
                docker compose -f docker-compose.yf-node.yml logs --tail 50
                docker logout ghcr.io
                exit 1
              fi
            done

            # 清理
            echo "$TARGET_TAG" > $DEPLOY_PATH/.deployed_sha
            docker logout ghcr.io
            docker image prune -f
            echo "Deploy OK (node: ${{ matrix.node_id }}, tag: $TARGET_TAG)"

      - name: Deploy summary
        if: always()
        run: |
          echo "## YF Node Deploy: ${{ matrix.node_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ needs.deploy-yf.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node | ${{ matrix.node_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ env.GHCR_IMAGE }}:${{ steps.set_tag.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
