name: Frontend CI

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # ==========================================
  # Stage 1: CI Quality Gates
  # ==========================================
  # 分支保护由 GitHub Branch Protection Rules 处理
  # ==========================================
  test:
    name: 🧪 Test & Coverage
    runs-on: ubuntu-latest
    # 💡 仅在 develop 推送和 PR 时运行，main 推送跳过（信任 develop 已验证）
    if: github.ref != 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        working-directory: ./frontend
        run: pnpm exec vitest run --coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: 🔨 Build & Lint
    runs-on: ubuntu-latest
    needs: [test]
    # 💡 main 推送时直接构建部署（跳过测试），develop/PR 时也运行
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')

    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: ./frontend
        run: |
          pnpm run lint || true
          pnpm run type-check || true
      - name: Build
        working-directory: ./frontend
        run: NODE_OPTIONS='--max-old-space-size=4096' pnpm run build
      - name: Security audit
        working-directory: ./frontend
        run: pnpm audit 2>&1 || true
        continue-on-error: true
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  deploy:
    name: 🚀 Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    if: always() && needs.build.result == 'success' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check secrets
        id: check
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN not configured, skipping deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v4
        if: steps.check.outputs.skip == 'false'
      - name: Install pnpm
        if: steps.check.outputs.skip == 'false'
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Set up Node.js
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile
      - name: Build
        if: steps.check.outputs.skip == 'false'
        working-directory: ./frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: NODE_OPTIONS='--max-old-space-size=4096' pnpm run build
      - name: Deploy to Cloudflare Pages
        if: steps.check.outputs.skip == 'false'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          projectName: quant-agent
          directory: frontend/dist
          branch: ${{ github.ref_name }}
