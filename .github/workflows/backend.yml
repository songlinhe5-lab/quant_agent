name: Backend CI

on:
  # develop 分支: 仅跑 CI (lint + test + security)，不部署
  push:
    branches: [ main, develop ]
  # PR 到 main: 跑 CI 作为质量门禁 (merge 前必须通过)
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/backend.yml'
      - 'Dockerfile'
      - 'docker-compose.yml'
  # 手动触发: 部署所有节点
  workflow_dispatch:

jobs:
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff lint
        run: uv run ruff check backend/
      - name: Ruff format check
        run: uv run ruff format --check backend/

  test:
    name: 🧪 Test & Coverage
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          INTERNAL_API_SECRET: test-secret-key
          EMBEDDING_API_KEY: test-key
          EMBEDDING_BASE_URL: https://api.test.com
          EMBEDDING_MODEL: BAAI/bge-large-zh-v1.5
        run: |
          uv run pytest backend/tests/ -v \
            --cov=backend --cov-report=xml:coverage.xml --cov-report=term-missing \
            --cov-fail-under=25
      - name: 🐢 Detect slow tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          INTERNAL_API_SECRET: test-secret-key
          EMBEDDING_API_KEY: test-key
          EMBEDDING_BASE_URL: https://api.test.com
          EMBEDDING_MODEL: BAAI/bge-large-zh-v1.5
        run: |
          echo "## 🐢 Slow Tests Report (Top 20)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          uv run pytest backend/tests/ --durations=20 --tb=no -q 2>&1 | tee /tmp/slow_tests.txt
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/slow_tests.txt | grep -A 30 "slowest" >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
        if: always()
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-extras
      - name: pip-audit vulnerability scan
        run: uv run pip-audit --desc --require-hashes 2>&1 || true
        continue-on-error: true

  # ==========================================
  # 🚀 多节点部署 (Tailscale 集群)
  # ==========================================
  # 节点拓扑:
  #   Master  → API + Worker + Redis + PostgreSQL + 监控 + akshare + yfinance
  #   Slave-1 → finnhub + yfinance
  #   Slave-2 → yfinance only
  #   Slave-3 → yfinance only
  #   Slave-4 → yfinance only
  #
  # GitHub Secrets 仅存 SSH 连接信息，应用配置在各 VPS 的 .env 中预置。
  #
  # 容错策略:
  #   - 主节点部署失败 → 整体失败
  #   - 从节点部署失败 → 仅记录日志, 不阻断
  deploy:
    name: 🚀 Deploy Multi-Node
    runs-on: ubuntu-latest
    needs: [test, security]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      # ==========================================
      # 主节点 (master + monitoring)
      # ==========================================
      - name: 🚀 Deploy → Master
        id: deploy_master
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            DEPLOY_PATH=/opt/quant-agent
            PROFILES="master,monitoring"

            sudo chown -R ubuntu:ubuntu $DEPLOY_PATH
            sudo chmod -R u+w $DEPLOY_PATH/.git
            git config --global --add safe.directory $DEPLOY_PATH
            mkdir -p ~/.ssh && ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

            echo "📥 拉取最新代码..."
            cd $DEPLOY_PATH
            git fetch origin main && git reset --hard origin/main

            echo "🛑 停止容器..."
            COMPOSE_PROFILES=$PROFILES sudo docker compose down || true

            echo "🔨 构建镜像..."
            sudo docker compose build --no-cache

            echo "🚀 启动服务..."
            COMPOSE_PROFILES=$PROFILES sudo docker compose up -d --remove-orphans

            echo "⏳ 等待启动 (30s)..."
            sleep 30

            HEALTH=$(curl -sf --max-time 10 http://localhost:8000/api/v1/health 2>/dev/null || echo "UNHEALTHY")
            if [ "$HEALTH" = "UNHEALTHY" ]; then
              echo "❌ 健康检查失败!"
              COMPOSE_PROFILES=$PROFILES sudo docker compose logs --tail 30
              exit 1
            fi
            echo "✅ Master 节点健康检查通过"

            sudo docker image prune -f
            sudo docker builder prune -af --filter "until=168h"
            echo "✅ Master 节点部署完成"

      # ==========================================
      # Slave-1 (finnhub + yfinance)
      # ==========================================
      - name: 📡 Deploy → Slave-1 (finnhub+yf)
        id: deploy_s1
        if: always() && steps.deploy_master.outcome == 'success'
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_S1_HOST }}
          username: ${{ secrets.VPS_S1_USER }}
          key: ${{ secrets.VPS_S1_SSH_KEY }}
          script: |
            set -e
            DEPLOY_PATH=/opt/quant-agent
            PROFILES="slave"

            sudo chown -R ubuntu:ubuntu $DEPLOY_PATH
            sudo chmod -R u+w $DEPLOY_PATH/.git
            git config --global --add safe.directory $DEPLOY_PATH
            mkdir -p ~/.ssh && ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

            echo "📥 拉取最新代码..."
            cd $DEPLOY_PATH
            git fetch origin main && git reset --hard origin/main

            echo "🛑 停止容器..."
            COMPOSE_PROFILES=$PROFILES sudo docker compose down || true

            echo "🔨 构建镜像..."
            sudo docker compose build --no-cache

            echo "🚀 启动服务..."
            COMPOSE_PROFILES=$PROFILES sudo docker compose up -d --remove-orphans

            echo "⏳ 等待启动 (30s)..."
            sleep 30

            HEALTH=$(curl -sf --max-time 10 http://localhost:8001/health 2>/dev/null || echo "UNHEALTHY")
            if [ "$HEALTH" = "UNHEALTHY" ]; then
              echo "❌ Slave-1 健康检查失败 (非致命)"
              COMPOSE_PROFILES=$PROFILES sudo docker compose logs --tail 30
              exit 1
            fi
            echo "✅ Slave-1 健康检查通过"

            sudo docker image prune -f
            sudo docker builder prune -af --filter "until=168h"
            echo "✅ Slave-1 部署完成"

      # ==========================================
      # Slave-2 (yfinance only)
      # ==========================================
      - name: 📡 Deploy → Slave-2 (yf)
        id: deploy_s2
        if: always() && steps.deploy_master.outcome == 'success'
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_S2_HOST }}
          username: ${{ secrets.VPS_S2_USER }}
          key: ${{ secrets.VPS_S2_SSH_KEY }}
          script: |
            set -e
            DEPLOY_PATH=/opt/quant-agent
            PROFILES="slave"

            sudo chown -R ubuntu:ubuntu $DEPLOY_PATH
            sudo chmod -R u+w $DEPLOY_PATH/.git
            git config --global --add safe.directory $DEPLOY_PATH
            mkdir -p ~/.ssh && ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

            echo "📥 拉取最新代码..."
            cd $DEPLOY_PATH
            git fetch origin main && git reset --hard origin/main

            echo "🛑 停止容器..."
            COMPOSE_PROFILES=$PROFILES sudo docker compose down || true

            echo "🔨 构建镜像..."
            sudo docker compose build --no-cache

            echo "🚀 启动服务..."
            COMPOSE_PROFILES=$PROFILES sudo docker compose up -d --remove-orphans

            echo "⏳ 等待启动 (30s)..."
            sleep 30

            HEALTH=$(curl -sf --max-time 10 http://localhost:8001/health 2>/dev/null || echo "UNHEALTHY")
            if [ "$HEALTH" = "UNHEALTHY" ]; then
              echo "❌ Slave-2 健康检查失败 (非致命)"
              COMPOSE_PROFILES=$PROFILES sudo docker compose logs --tail 30
              exit 1
            fi
            echo "✅ Slave-2 健康检查通过"

            sudo docker image prune -f
            sudo docker builder prune -af --filter "until=168h"
            echo "✅ Slave-2 部署完成"

      # ==========================================
      # Slave-3 (yfinance only)
      # ==========================================
      - name: 📡 Deploy → Slave-3 (yf)
        id: deploy_s3
        if: always() && steps.deploy_master.outcome == 'success'
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_S3_HOST }}
          username: ${{ secrets.VPS_S3_USER }}
          key: ${{ secrets.VPS_S3_SSH_KEY }}
          script: |
            set -e
            DEPLOY_PATH=/opt/quant-agent
            PROFILES="slave"

            sudo chown -R ubuntu:ubuntu $DEPLOY_PATH
            sudo chmod -R u+w $DEPLOY_PATH/.git
            git config --global --add safe.directory $DEPLOY_PATH
            mkdir -p ~/.ssh && ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

            echo "📥 拉取最新代码..."
            cd $DEPLOY_PATH
            git fetch origin main && git reset --hard origin/main

            echo "🛑 停止容器..."
            COMPOSE_PROFILES=$PROFILES sudo docker compose down || true

            echo "🔨 构建镜像..."
            sudo docker compose build --no-cache

            echo "🚀 启动服务..."
            COMPOSE_PROFILES=$PROFILES sudo docker compose up -d --remove-orphans

            echo "⏳ 等待启动 (30s)..."
            sleep 30

            HEALTH=$(curl -sf --max-time 10 http://localhost:8001/health 2>/dev/null || echo "UNHEALTHY")
            if [ "$HEALTH" = "UNHEALTHY" ]; then
              echo "❌ Slave-3 健康检查失败 (非致命)"
              COMPOSE_PROFILES=$PROFILES sudo docker compose logs --tail 30
              exit 1
            fi
            echo "✅ Slave-3 健康检查通过"

            sudo docker image prune -f
            sudo docker builder prune -af --filter "until=168h"
            echo "✅ Slave-3 部署完成"

      # ==========================================
      # Slave-4 (yfinance only)
      # ==========================================
      - name: 📡 Deploy → Slave-4 (yf)
        id: deploy_s4
        if: always() && steps.deploy_master.outcome == 'success'
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_S4_HOST }}
          username: ${{ secrets.VPS_S4_USER }}
          key: ${{ secrets.VPS_S4_SSH_KEY }}
          script: |
            set -e
            DEPLOY_PATH=/opt/quant-agent
            PROFILES="slave"

            sudo chown -R ubuntu:ubuntu $DEPLOY_PATH
            sudo chmod -R u+w $DEPLOY_PATH/.git
            git config --global --add safe.directory $DEPLOY_PATH
            mkdir -p ~/.ssh && ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

            echo "📥 拉取最新代码..."
            cd $DEPLOY_PATH
            git fetch origin main && git reset --hard origin/main

            echo "🛑 停止容器..."
            COMPOSE_PROFILES=$PROFILES sudo docker compose down || true

            echo "🔨 构建镜像..."
            sudo docker compose build --no-cache

            echo "🚀 启动服务..."
            COMPOSE_PROFILES=$PROFILES sudo docker compose up -d --remove-orphans

            echo "⏳ 等待启动 (30s)..."
            sleep 30

            HEALTH=$(curl -sf --max-time 10 http://localhost:8001/health 2>/dev/null || echo "UNHEALTHY")
            if [ "$HEALTH" = "UNHEALTHY" ]; then
              echo "❌ Slave-4 健康检查失败 (非致命)"
              COMPOSE_PROFILES=$PROFILES sudo docker compose logs --tail 30
              exit 1
            fi
            echo "✅ Slave-4 健康检查通过"

            sudo docker image prune -f
            sudo docker builder prune -af --filter "until=168h"
            echo "✅ Slave-4 部署完成"

      # ==========================================
      # 部署总结
      # ==========================================
      - name: 📋 部署总结
        if: always()
        run: |
          echo "## 🚀 部署结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 节点 | 角色 | 采集器 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|--------|------|" >> $GITHUB_STEP_SUMMARY

          M="${{ steps.deploy_master.outcome }}"
          S1="${{ steps.deploy_s1.outcome }}"
          S2="${{ steps.deploy_s2.outcome }}"
          S3="${{ steps.deploy_s3.outcome }}"
          S4="${{ steps.deploy_s4.outcome }}"

          echo "| Master | master+monitoring | akshare,yf | ${M} |" >> $GITHUB_STEP_SUMMARY
          echo "| Slave-1 | slave | finnhub,yf | ${S1} |" >> $GITHUB_STEP_SUMMARY
          echo "| Slave-2 | slave | yf | ${S2} |" >> $GITHUB_STEP_SUMMARY
          echo "| Slave-3 | slave | yf | ${S3} |" >> $GITHUB_STEP_SUMMARY
          echo "| Slave-4 | slave | yf | ${S4} |" >> $GITHUB_STEP_SUMMARY

          # 主节点失败则整体失败
          if [ "$M" = "failure" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **主节点部署失败，请检查日志**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # 从节点失败仅警告
          SLAVE_FAIL=""
          [ "$S1" = "failure" ] && SLAVE_FAIL="${SLAVE_FAIL} Slave-1"
          [ "$S2" = "failure" ] && SLAVE_FAIL="${SLAVE_FAIL} Slave-2"
          [ "$S3" = "failure" ] && SLAVE_FAIL="${SLAVE_FAIL} Slave-3"
          [ "$S4" = "failure" ] && SLAVE_FAIL="${SLAVE_FAIL} Slave-4"
          if [ -n "$SLAVE_FAIL" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **从节点部署失败 (不影响主服务):${SLAVE_FAIL}**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 部署流程完成"
