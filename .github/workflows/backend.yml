name: Backend CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'backend/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/backend.yml'
      - 'Dockerfile'
      - 'docker-compose.yml'
  # 🔧 手动触发：可选择部署目标节点
  workflow_dispatch:
    inputs:
      deploy_target:
        description: '部署目标节点'
        required: true
        type: choice
        options:
          - all
          - beijing
          - overseas
        default: all

jobs:
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff lint
        run: uv run ruff check backend/
      - name: Ruff format check
        run: uv run ruff format --check backend/

  test:
    name: 🧪 Test & Coverage
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          INTERNAL_API_SECRET: test-secret-key
          EMBEDDING_API_KEY: test-key
          EMBEDDING_BASE_URL: https://api.test.com
          EMBEDDING_MODEL: BAAI/bge-large-zh-v1.5
        run: |
          uv run pytest backend/tests/ -v \
            --cov=backend --cov-report=xml:coverage.xml --cov-report=term-missing \
            --cov-fail-under=25
      - name: 🐢 Detect slow tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          INTERNAL_API_SECRET: test-secret-key
          EMBEDDING_API_KEY: test-key
          EMBEDDING_BASE_URL: https://api.test.com
          EMBEDDING_MODEL: BAAI/bge-large-zh-v1.5
        run: |
          echo "## 🐢 Slow Tests Report (Top 20)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          uv run pytest backend/tests/ --durations=20 --tb=no -q 2>&1 | tee /tmp/slow_tests.txt
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/slow_tests.txt | grep -A 30 "slowest" >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
        if: always()
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-extras
      - name: pip-audit vulnerability scan
        run: uv run pip-audit --desc --require-hashes 2>&1 || true
        continue-on-error: true

  # ==========================================
  # 🚀 多节点矩阵部署
  # ==========================================
  # push 到 main: 自动部署所有节点
  # workflow_dispatch: 可选择部署指定节点
  deploy:
    name: 🚀 Deploy (${{ matrix.node_name }})
    runs-on: ubuntu-latest
    needs: [test, security]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - node_name: beijing
            host_secret: VPS_BEIJING_HOST
            user_secret: VPS_BEIJING_USER
            key_secret: VPS_BEIJING_SSH_KEY
            compose_profiles: monitoring
            deploy_path: /opt/quant-agent
          - node_name: overseas
            host_secret: VPS_OVERSEAS_HOST
            user_secret: VPS_OVERSEAS_USER
            key_secret: VPS_OVERSEAS_SSH_KEY
            compose_profiles: ""
            deploy_path: /opt/quant-agent
    # 根据手动触发选择过滤节点
    # workflow_dispatch 时: deploy_target=all 全部部署, beijing/overseas 只部署对应节点
    # push 时: 全部部署

    steps:
      - name: 🎯 判断是否部署此节点
        id: should_deploy
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.deploy_target }}"
            if [ "$TARGET" = "all" ] || [ "$TARGET" = "${{ matrix.node_name }}" ]; then
              echo "deploy=true" >> $GITHUB_OUTPUT
              echo "✅ 将部署到 ${{ matrix.node_name }} 节点"
            else
              echo "deploy=false" >> $GITHUB_OUTPUT
              echo "⏭️ 跳过 ${{ matrix.node_name }} 节点 (目标: $TARGET)"
            fi
          else
            # push 事件: 部署所有节点
            echo "deploy=true" >> $GITHUB_OUTPUT
            echo "✅ push 事件，将部署到 ${{ matrix.node_name }} 节点"
          fi

      - name: 🚀 Deploy to ${{ matrix.node_name }}
        if: steps.should_deploy.outputs.deploy == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets[matrix.user_secret] }}
          key: ${{ secrets[matrix.key_secret] }}
          script: |
            set -e
            cd ${{ matrix.deploy_path }}

            # 修复目录权限
            sudo chown -R ubuntu:ubuntu ${{ matrix.deploy_path }}
            sudo chmod -R u+w ${{ matrix.deploy_path }}/.git
            git config --global --add safe.directory ${{ matrix.deploy_path }}

            # 接受 GitHub 主机密钥
            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

            # 1. 拉取最新代码
            echo "📥 拉取最新代码..."
            git fetch origin main
            git reset --hard origin/main

            # 2. 记录当前镜像 ID，用于失败回滚
            PREV_IMAGE=$(sudo docker compose ps -q quant-agent 2>/dev/null | head -1 | xargs -I{} sudo docker inspect --format='{{.Id}}' {} 2>/dev/null || echo "none")

            # 3. 停掉容器释放内存
            echo "🛑 停掉容器释放内存..."
            COMPOSE_PROFILES=${{ matrix.compose_profiles }} sudo docker compose down || true

            # 4. 本地构建新镜像
            echo "🔨 本地构建 Docker 镜像..."
            sudo docker compose build --no-cache

            # 5. 重启服务（带 profile 控制）
            echo "🚀 重启服务 (profiles: ${{ matrix.compose_profiles || 'default' }})..."
            COMPOSE_PROFILES=${{ matrix.compose_profiles }} sudo docker compose up -d --remove-orphans

            # 6. 等待服务启动
            echo "⏳ 等待服务启动 (30s)..."
            sleep 30

            # 7. 健康检查
            HEALTH=$(curl -sf --max-time 10 http://localhost:8000/api/v1/health 2>/dev/null || echo "UNHEALTHY")
            if [ "$HEALTH" = "UNHEALTHY" ]; then
              echo "❌ 健康检查失败！请检查日志: sudo docker compose logs quant-agent"
              exit 1
            fi
            echo "✅ 健康检查通过"

            # 8. 清理旧镜像与构建缓存
            echo "🧹 清理旧镜像与构建缓存..."
            sudo docker image prune -f
            sudo docker builder prune -af --filter "until=168h"
            sudo docker volume prune -f

            # 9. 输出部署信息
            echo "📋 部署信息:"
            echo "  节点: ${{ matrix.node_name }}"
            echo "  Profiles: ${{ matrix.compose_profiles || 'default' }}"
            echo "💾 磁盘使用:"
            df -h / | tail -1
            echo "🐳 容器状态:"
            sudo docker compose ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"

            echo "✅ ${{ matrix.node_name }} 节点部署成功！"
