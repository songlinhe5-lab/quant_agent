name: Backend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: 'Commit SHA to rollback to (leave empty for normal deploy)'
        required: false
        type: string

env:
  GHCR_IMAGE: ghcr.io/songlinhe5-lab/quant-agent
  UV_HTTP_TIMEOUT: 300

permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # Stage 1: CI Quality Gates
  # ==========================================
  # 分支保护由 GitHub Branch Protection Rules 处理，不再需要手动检查
  # ==========================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            uv sync --all-extras && break
            echo "uv sync failed (attempt $i), retrying in 10s..."
            sleep 10
          done
      - name: Ruff lint
        run: uv run ruff check backend/
      - name: Ruff format check
        run: uv run ruff format --check backend/

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: [lint]
    if: always() && (needs.lint.result == 'success' || needs.lint.result == 'skipped')

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            uv sync --all-extras && break
            echo "uv sync failed (attempt $i), retrying in 10s..."
            sleep 10
          done
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          INTERNAL_API_SECRET: test-secret-key
          EMBEDDING_API_KEY: test-key
          EMBEDDING_BASE_URL: https://api.test.com
          EMBEDDING_MODEL: BAAI/bge-large-zh-v1.5
        run: |
          uv run pytest backend/tests/ -v \
            --timeout=60 --timeout-method=thread \
            --cov=backend --cov-report=xml:coverage.xml --cov-report=term-missing \
            --cov-fail-under=70
      - name: Detect slow tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          INTERNAL_API_SECRET: test-secret-key
          EMBEDDING_API_KEY: test-key
          EMBEDDING_BASE_URL: https://api.test.com
          EMBEDDING_MODEL: BAAI/bge-large-zh-v1.5
        run: |
          echo "## Slow Tests Report (Top 20)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          uv run pytest backend/tests/ --durations=20 --tb=no -q 2>&1 | tee /tmp/slow_tests.txt
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/slow_tests.txt | grep -A 30 "slowest" >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
        if: always()
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            uv sync --all-extras && break
            echo "uv sync failed (attempt $i), retrying in 10s..."
            sleep 10
          done
      - name: pip-audit vulnerability scan
        run: uv run pip-audit --desc --require-hashes 2>&1 || true
        continue-on-error: true

  # ==========================================
  # Stage 2: Build & Push to GHCR
  # ==========================================
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: |
      always() &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       (github.event_name == 'workflow_dispatch' && !inputs.rollback_sha)) &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.security.result == 'success' || needs.security.result == 'skipped')
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # Stage 3: Deploy to VPS (美国主节点)
  # ==========================================
  # Secrets: VPS_S1_HOST / VPS_S1_USER / VPS_S1_SSH_KEY
  # ==========================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      always() &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       github.event_name == 'workflow_dispatch') &&
      needs.build.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Set target image tag
        id: set_tag
        run: |
          if [ -n "${{ inputs.rollback_sha }}" ]; then
            TAG="sha-${{ inputs.rollback_sha }}"
          else
            TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying image tag: $TAG"

      - name: Prepare compose file (base64)
        id: prepare_compose
        run: |
          echo "compose_b64=$(base64 -w0 docker-compose.yml)" >> $GITHUB_OUTPUT

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_S1_HOST }}
          username: ${{ secrets.VPS_S1_USER }}
          key: ${{ secrets.VPS_S1_SSH_KEY }}
          envs: GITHUB_ACTOR
          command_timeout: 30m
          script: |
            set -e
            DEPLOY_PATH=/opt/quant-agent
            TARGET_TAG="${{ steps.set_tag.outputs.tag }}"

            mkdir -p $DEPLOY_PATH
            cd $DEPLOY_PATH

            # 更新 compose 文件中的镜像 tag
            echo '${{ steps.prepare_compose.outputs.compose_b64 }}' | base64 -d > docker-compose.yml
            sed -i "s|ghcr.io/songlinhe5-lab/quant-agent:.*|ghcr.io/songlinhe5-lab/quant-agent:${TARGET_TAG}|g" docker-compose.yml

            # 检查 .env 存在
            if [ ! -f .env ]; then
              echo "ERROR: .env not found! Please create /opt/quant-agent/.env"
              exit 1
            fi

            # 拉取新镜像
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            docker pull ghcr.io/songlinhe5-lab/quant-agent:${TARGET_TAG}

            # 启动服务
            docker compose -f docker-compose.yml up -d --remove-orphans

            # 健康检查 (最多 90s)
            for i in 1 2 3 4 5 6; do
              sleep 15
              HEALTH=$(curl -sf --max-time 10 http://localhost:8000/api/v1/health 2>/dev/null || echo "UNHEALTHY")
              if [ "$HEALTH" != "UNHEALTHY" ]; then
                echo "Health check passed on attempt $i"
                break
              fi
              echo "Attempt $i/6 failed, retrying..."
              if [ "$i" = "6" ]; then
                echo "Health check FAILED after 6 attempts (90s)"
                docker compose -f docker-compose.yml logs --tail 50
                docker logout ghcr.io
                exit 1
              fi
            done

            # 清理
            echo "$TARGET_TAG" > $DEPLOY_PATH/.deployed_sha
            docker logout ghcr.io
            docker image prune -f
            echo "Deploy OK (tag: $TARGET_TAG)"

      - name: Deploy summary
        if: always()
        run: |
          echo "## Deploy Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ env.GHCR_IMAGE }}:${{ steps.set_tag.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | ${{ secrets.VPS_S1_HOST }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.rollback_sha }}" != "" ]; then
            echo "| Rollback | ${{ inputs.rollback_sha }} |" >> $GITHUB_STEP_SUMMARY
          fi

  # ==========================================
  # Stage 4: Tailscale 跨节点连通性验证 (OPS-02)
  # ==========================================
  verify_tailscale:
    name: Verify Tailscale Connectivity
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always() && needs.deploy.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Verify Tailscale cross-node connectivity
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_S1_HOST }}
          username: ${{ secrets.VPS_S1_USER }}
          key: ${{ secrets.VPS_S1_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            echo "=== Tailscale 状态检查 ==="
            
            # 检查 Tailscale 服务
            if ! command -v tailscale &> /dev/null; then
              echo "ERROR: Tailscale 未安装"
              exit 1
            fi
            
            # 显示 Tailnet 状态
            echo "Tailnet 节点:"
            tailscale status
            
            # 获取本机 Tailscale IP
            TS_IP=$(tailscale ip -4)
            echo "本机 Tailscale IP: $TS_IP"
            
            # 检查关键端口绑定
            echo ""
            echo "=== 端口绑定检查 ==="
            echo "Redis 绑定:"
            ss -tlnp | grep ':6379' || echo "Redis 未监听"
            
            echo "Postgres 绑定:"
            ss -tlnp | grep ':5432' || echo "Postgres 未监听"
            
            # 验证 Redis 不对公网暴露
            PUBLIC_IP=$(curl -s ifconfig.me 2>/dev/null || echo "")
            if [ -n "$PUBLIC_IP" ]; then
              if ss -tlnp | grep -q ":6379.*0\.0\.0\.0"; then
                echo "ERROR: Redis 绑定到 0.0.0.0 (公网可访问)!"
                exit 1
              fi
              echo "✓ Redis 未对公网暴露"
            fi
            
            # 测试跨节点连通性 (如果 CN-AKSHARE 在线)
            CN_IP="${{ secrets.CN_VPS_TAILSCALE_IP }}"
            if [ -n "$CN_IP" ]; then
              echo ""
              echo "=== CN-AKSHARE 连通性测试 ==="
              if ping -c 1 -W 3 "$CN_IP" &> /dev/null; then
                echo "✓ CN-AKSHARE ($CN_IP) 可达"
              else
                echo "⚠ CN-AKSHARE ($CN_IP) 不可达 (可能离线)"
              fi
            fi
            
            echo ""
            echo "=== Tailscale 验证完成 ==="

      - name: Tailscale verification summary
        if: always()
        run: |
          echo "## Tailscale Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ needs.verify_tailscale.result }} |" >> $GITHUB_STEP_SUMMARY
