name: Backend CI

on:
  # develop 分支: 仅跑 CI (lint + test + security)，不部署
  push:
    branches: [ main, develop ]
  # PR 到 main: 跑 CI 作为质量门禁 (merge 前必须通过)
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/backend.yml'
      - 'Dockerfile'
      - 'docker-compose.yml'
  # 手动触发: 部署所有节点
  workflow_dispatch:

jobs:
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff lint
        run: uv run ruff check backend/
      - name: Ruff format check
        run: uv run ruff format --check backend/

  test:
    name: 🧪 Test & Coverage
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          INTERNAL_API_SECRET: test-secret-key
          EMBEDDING_API_KEY: test-key
          EMBEDDING_BASE_URL: https://api.test.com
          EMBEDDING_MODEL: BAAI/bge-large-zh-v1.5
        run: |
          uv run pytest backend/tests/ -v \
            --cov=backend --cov-report=xml:coverage.xml --cov-report=term-missing \
            --cov-fail-under=25
      - name: 🐢 Detect slow tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          INTERNAL_API_SECRET: test-secret-key
          EMBEDDING_API_KEY: test-key
          EMBEDDING_BASE_URL: https://api.test.com
          EMBEDDING_MODEL: BAAI/bge-large-zh-v1.5
        run: |
          echo "## 🐢 Slow Tests Report (Top 20)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          uv run pytest backend/tests/ --durations=20 --tb=no -q 2>&1 | tee /tmp/slow_tests.txt
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/slow_tests.txt | grep -A 30 "slowest" >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
        if: always()
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-extras
      - name: pip-audit vulnerability scan
        run: uv run pip-audit --desc --require-hashes 2>&1 || true
        continue-on-error: true

  # ==========================================
  # 🚀 多节点部署 (Tailscale 集群)
  # ==========================================
  # 节点拓扑:
  #   Master  → API + Worker + Redis + PostgreSQL + 监控 + akshare + yfinance
  #   Slave-1 → finnhub + yfinance
  #   Slave-2 → yfinance only
  #   Slave-3 → yfinance only
  #   Slave-4 → yfinance only
  #
  # GitHub Secrets 仅存 SSH 连接信息，应用配置在各 VPS 的 .env 中预置。
  #
  # 容错策略:
  #   - 主节点部署失败 → 整体失败
  #   - 从节点部署失败 → 仅记录日志, 不阻断
  deploy:
    name: 🚀 Deploy Multi-Node
    runs-on: ubuntu-latest
    needs: [test, security]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      # ==========================================
      # 主节点 (master + monitoring)
      # ==========================================
      - name: 🚀 Deploy → Master
        id: deploy_master
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            DEPLOY_PATH=/opt/quant-agent
            PROFILES="master,monitoring"

            sudo chown -R ubuntu:ubuntu $DEPLOY_PATH
            sudo chmod -R u+w $DEPLOY_PATH/.git
            git config --global --add safe.directory $DEPLOY_PATH
            mkdir -p ~/.ssh && ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

            echo "📥 拉取最新代码..."
            cd $DEPLOY_PATH
            git fetch origin main && git reset --hard origin/main

            echo "🛑 停止容器..."
            sudo COMPOSE_PROFILES=$PROFILES docker compose down || true

            echo "🔨 构建镜像..."
            sudo docker compose build --no-cache

            echo "🚀 启动服务..."
            sudo COMPOSE_PROFILES=$PROFILES docker compose up -d --remove-orphans

            echo "⏳ 等待启动 (30s)..."
            sleep 30

            HEALTH=$(curl -sf --max-time 10 http://localhost:8000/api/v1/health 2>/dev/null || echo "UNHEALTHY")
            if [ "$HEALTH" = "UNHEALTHY" ]; then
              echo "❌ 健康检查失败!"
              sudo COMPOSE_PROFILES=$PROFILES docker compose logs --tail 30
              exit 1
            fi
            echo "✅ Master 节点健康检查通过"

            sudo docker image prune -f
            sudo docker builder prune -af --filter "until=168h"
            echo "✅ Master 节点部署完成"

      # ==========================================
      # 从节点部署 (通过主节点跳转 Tailscale)
      # ==========================================
      - name: 📡 Deploy → All Slaves (via Master)
        id: deploy_slaves
        if: always() && steps.deploy_master.outcome == 'success'
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        env:
          S1_HOST: ${{ secrets.VPS_S1_HOST }}
          S1_USER: ${{ secrets.VPS_S1_USER }}
          S1_KEY: ${{ secrets.VPS_S1_SSH_KEY }}
          S2_HOST: ${{ secrets.VPS_S2_HOST }}
          S2_USER: ${{ secrets.VPS_S2_USER }}
          S2_KEY: ${{ secrets.VPS_S2_SSH_KEY }}
          S3_HOST: ${{ secrets.VPS_S3_HOST }}
          S3_USER: ${{ secrets.VPS_S3_USER }}
          S3_KEY: ${{ secrets.VPS_S3_SSH_KEY }}
          S4_HOST: ${{ secrets.VPS_S4_HOST }}
          S4_USER: ${{ secrets.VPS_S4_USER }}
          S4_KEY: ${{ secrets.VPS_S4_SSH_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          env: S1_HOST,S1_USER,S1_KEY,S2_HOST,S2_USER,S2_KEY,S3_HOST,S3_USER,S3_KEY,S4_HOST,S4_USER,S4_KEY
          script: |
            set -e

            # 写入从节点 SSH 密钥
            mkdir -p ~/.ssh
            echo "$S1_KEY" > ~/.ssh/slave_1
            echo "$S2_KEY" > ~/.ssh/slave_2
            echo "$S3_KEY" > ~/.ssh/slave_3
            echo "$S4_KEY" > ~/.ssh/slave_4
            chmod 600 ~/.ssh/slave_*

            # 从节点部署函数
            deploy_slave() {
              local SLAVE_ID=$1 SLAVE_IP=$2 SLAVE_USER=$3 SLAVE_KEY=$4
              echo ""
              echo "========== 部署 $SLAVE_ID ($SLAVE_IP) =========="

              ssh -i ~/.ssh/$SLAVE_KEY -o StrictHostKeyChecking=no -o ConnectTimeout=10 $SLAVE_USER@$SLAVE_IP \
                "set -e && \
                DEPLOY_PATH=/opt/quant-agent && \
                PROFILES=slave && \
                git config --global --add safe.directory \$DEPLOY_PATH 2>/dev/null || true && \
                mkdir -p ~/.ssh && ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null && \
                echo '📥 拉取最新代码...' && \
                cd \$DEPLOY_PATH && \
                git fetch origin main && git reset --hard origin/main && \
                echo '🛑 停止容器...' && \
                sudo COMPOSE_PROFILES=\$PROFILES docker compose down || true && \
                echo '🔨 构建镜像...' && \
                sudo docker compose build --no-cache && \
                echo '🚀 启动服务...' && \
                sudo COMPOSE_PROFILES=\$PROFILES docker compose up -d --remove-orphans && \
                echo '⏳ 等待启动 (30s)...' && \
                sleep 30 && \
                HEALTH=\$(curl -sf --max-time 10 http://localhost:8001/health 2>/dev/null || echo UNHEALTHY) && \
                if [ \"\$HEALTH\" = 'UNHEALTHY' ]; then echo '❌ 健康检查失败'; sudo COMPOSE_PROFILES=\$PROFILES docker compose logs --tail 20; exit 1; fi && \
                echo '✅ $SLAVE_ID 部署完成' && \
                sudo docker image prune -f && \
                sudo docker builder prune -af --filter 'until=168h'" || echo "❌ $SLAVE_ID 部署失败 (非致命)"

              echo "✅ $SLAVE_ID 步骤完成"
            }

            # 部署 4 个从节点
            deploy_slave "Slave-1" "$S1_HOST" "$S1_USER" "slave_1"
            deploy_slave "Slave-2" "$S2_HOST" "$S2_USER" "slave_2"
            deploy_slave "Slave-3" "$S3_HOST" "$S3_USER" "slave_3"
            deploy_slave "Slave-4" "$S4_HOST" "$S4_USER" "slave_4"

            # 清理密钥
            rm -f ~/.ssh/slave_*
            echo "✅ 从节点部署流程完成"

      # ==========================================
      # 部署总结
      # ==========================================
      - name: 📋 部署总结
        if: always()
        run: |
          echo "## 🚀 部署结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 节点 | 角色 | 采集器 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|--------|------|" >> $GITHUB_STEP_SUMMARY

          M="${{ steps.deploy_master.outcome }}"
          SLAVES="${{ steps.deploy_slaves.outcome }}"

          echo "| Master | master+monitoring | akshare,yf | ${M} |" >> $GITHUB_STEP_SUMMARY
          echo "| Slaves (1-4) | slave | finnhub,yf | ${SLAVES} |" >> $GITHUB_STEP_SUMMARY

          # 主节点失败则整体失败
          if [ "$M" = "failure" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **主节点部署失败，请检查日志**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # 从节点失败仅警告
          if [ "$SLAVES" = "failure" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **部分从节点部署失败 (不影响主服务)**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 部署流程完成"
