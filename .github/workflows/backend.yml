name: Backend CI

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'backend/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'backend/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/backend.yml'

jobs:
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff lint
        run: uv run ruff check backend/
      - name: Ruff format check
        run: uv run ruff format --check backend/

  test:
    name: 🧪 Test & Coverage
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          INTERNAL_API_SECRET: test-secret-key
          EMBEDDING_API_KEY: test-key
          EMBEDDING_BASE_URL: https://api.test.com
          EMBEDDING_MODEL: BAAI/bge-large-zh-v1.5
        run: |
          uv run pytest backend/tests/ -v \
            --cov=backend --cov-report=xml:coverage.xml --cov-report=term-missing \
            --cov-fail-under=25
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --all-extras
      - name: pip-audit vulnerability scan
        run: uv run pip-audit --desc --require-hashes 2>&1 || true
        continue-on-error: true

  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/quant-agent

            # 登录 ghcr.io（凭证持久化，首次登录后后续自动复用）
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 记录当前运行的镜像 SHA，用于失败回滚
            PREV_IMAGE=$(sudo docker compose ps -q backend 2>/dev/null | xargs sudo docker inspect --format='{{.Id}}' 2>/dev/null || echo "none")

            # 拉取最新镜像并重启服务
            sudo docker compose pull
            sudo docker compose up -d --remove-orphans
            sudo docker image prune -f

            # 健康检查：等待服务启动后验证可用性
            echo "⏳ 等待服务启动 (30s)..."
            sleep 30
            HEALTH=$(curl -sf --max-time 10 http://localhost:8000/api/v1/health 2>/dev/null || echo "UNHEALTHY")
            if [ "$HEALTH" = "UNHEALTHY" ]; then
              echo "❌ 健康检查失败！尝试回滚..."
              sudo docker compose down
              # 回滚到上一个版本（如果有备份）
              echo "⚠️ 部署失败，请手动检查 VPS 日志: docker compose logs backend"
              exit 1
            fi
            echo "✅ 部署成功！服务健康运行中"
