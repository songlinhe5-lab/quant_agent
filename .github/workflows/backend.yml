name: Backend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: 'Commit SHA to rollback to (leave empty for normal deploy)'
        required: false
        type: string

env:
  GHCR_IMAGE: ghcr.io/songlinhe5-lab/quant-agent
  UV_HTTP_TIMEOUT: 300

permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # Stage 0: Branch Protection Check (Free Tier Workaround)
  # ==========================================
  enforce_branch_policy:
    name: Enforce develop→main Flow
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'Merge pull request')
    steps:
      - name: Block direct push to main
        run: |
          echo " ERROR: Direct push to main is NOT allowed!"
          echo ""
          echo "Please follow the correct workflow:"
          echo "  1. Push your changes to the 'develop' branch"
          echo "  2. Create a Pull Request: develop → main"
          echo "  3. Wait for CI checks to pass"
          echo "  4. Merge the PR into main"
          echo ""
          echo "This repository uses GitHub Free tier, which does not support branch protection rules."
          echo "This check enforces the develop→main workflow manually."
          exit 1

  # ==========================================
  # Stage 1: CI Quality Gates
  # ==========================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: [enforce_branch_policy]
    if: always() && needs.enforce_branch_policy.result == 'skipped'
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            uv sync --all-extras && break
            echo "uv sync failed (attempt $i), retrying in 10s..."
            sleep 10
          done
      - name: Ruff lint
        run: uv run ruff check backend/
      - name: Ruff format check
        run: uv run ruff format --check backend/

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: [lint, enforce_branch_policy]
    if: always() && (needs.lint.result == 'success' || needs.lint.result == 'skipped')

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            uv sync --all-extras && break
            echo "uv sync failed (attempt $i), retrying in 10s..."
            sleep 10
          done
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          INTERNAL_API_SECRET: test-secret-key
          EMBEDDING_API_KEY: test-key
          EMBEDDING_BASE_URL: https://api.test.com
          EMBEDDING_MODEL: BAAI/bge-large-zh-v1.5
        run: |
          uv run pytest backend/tests/ -v \
            --cov=backend --cov-report=xml:coverage.xml --cov-report=term-missing \
            --cov-fail-under=70
      - name: Detect slow tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          INTERNAL_API_SECRET: test-secret-key
          EMBEDDING_API_KEY: test-key
          EMBEDDING_BASE_URL: https://api.test.com
          EMBEDDING_MODEL: BAAI/bge-large-zh-v1.5
        run: |
          echo "## Slow Tests Report (Top 20)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          uv run pytest backend/tests/ --durations=20 --tb=no -q 2>&1 | tee /tmp/slow_tests.txt
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/slow_tests.txt | grep -A 30 "slowest" >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
        if: always()
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [test, enforce_branch_policy]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            uv sync --all-extras && break
            echo "uv sync failed (attempt $i), retrying in 10s..."
            sleep 10
          done
      - name: pip-audit vulnerability scan
        run: uv run pip-audit --desc --require-hashes 2>&1 || true
        continue-on-error: true

  # ==========================================
  # Stage 2: Build & Push to GHCR
  # ==========================================
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: |
      always() &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       (github.event_name == 'workflow_dispatch' && !inputs.rollback_sha)) &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.security.result == 'success' || needs.security.result == 'skipped')
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # Stage 3: Deploy Master
  # ==========================================
  deploy_master:
    name: Deploy Master
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      always() &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       github.event_name == 'workflow_dispatch') &&
      needs.build.result == 'success'
    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set target image tag
        id: set_tag
        run: |
          if [ -n "${{ inputs.rollback_sha }}" ]; then
            TAG="sha-${{ inputs.rollback_sha }}"
          else
            TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying image tag: $TAG"

      # Encode compose file on runner so we can write it on VPS
      - name: Prepare compose file (base64)
        id: prepare_compose
        run: |
          echo "b64=$(base64 -w0 docker-compose.yml)" >> $GITHUB_OUTPUT

      - name: Deploy Master
        uses: appleboy/ssh-action@v1
        env:
          TRANSIT_USER: ${{ secrets.VPS_S1_USER }}
          TRANSIT_SSH_KEY: ${{ secrets.VPS_S1_SSH_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GITHUB_ACTOR, TRANSIT_USER, TRANSIT_SSH_KEY
          command_timeout: 30m
          script: |
            set -e
            DEPLOY_PATH=/opt/quant-agent
            PROFILES="master,monitoring"
            TARGET_TAG="${{ steps.set_tag.outputs.tag }}"

            mkdir -p $DEPLOY_PATH
            cd $DEPLOY_PATH

            # Write docker-compose.yml (base64 from runner avoids all quoting issues)
            cp docker-compose.yml docker-compose.yml.bak 2>/dev/null || true
            echo '${{ steps.prepare_compose.outputs.b64 }}' | base64 -d > docker-compose.yml
            sudo sed -i "s|ghcr.io/songlinhe5-lab/quant-agent:.*|ghcr.io/songlinhe5-lab/quant-agent:${TARGET_TAG}|g" docker-compose.yml

            # .env is manually configured on Master, CI does not touch it
            if [ ! -f .env ]; then
              echo "ERROR: .env not found! Please manually create /opt/quant-agent/.env"
              exit 1
            fi
            echo ".env found, using manual config"

            # Write transit VPS SSH key to temp file (reuses VPS_S1_SSH_KEY)
            TRANSIT_KEY_FILE=$(mktemp)
            echo "$TRANSIT_SSH_KEY" > $TRANSIT_KEY_FILE
            chmod 600 $TRANSIT_KEY_FILE

            # GHCR login (use GITHUB_TOKEN from runner env)
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

            # Pull image via transit VPS (38.60.126.42) for faster download to domestic Master
            echo "Pulling image ${TARGET_TAG} via transit VPS (38.60.126.42)..."
            ssh -o StrictHostKeyChecking=no -i $TRANSIT_KEY_FILE ${TRANSIT_USER}@38.60.126.42 "
              set -e
              echo '${{ secrets.GITHUB_TOKEN }}' | sudo docker login ghcr.io -u '${GITHUB_ACTOR}' --password-stdin
              sudo docker pull ghcr.io/songlinhe5-lab/quant-agent:${TARGET_TAG}
              sudo docker save ghcr.io/songlinhe5-lab/quant-agent:${TARGET_TAG} | gzip > /tmp/${TARGET_TAG}.tar.gz
              sudo docker logout ghcr.io
            "

            # SCP tarball from transit VPS to Master
            echo "Transferring image from transit VPS..."
            scp -o StrictHostKeyChecking=no -i $TRANSIT_KEY_FILE ${TRANSIT_USER}@38.60.126.42:/tmp/${TARGET_TAG}.tar.gz /tmp/

            # Load and tag the image
            echo "Loading image on Master..."
            gunzip -c /tmp/${TARGET_TAG}.tar.gz | sudo docker load
            sudo docker tag ghcr.io/songlinhe5-lab/quant-agent:${TARGET_TAG} ghcr.io/songlinhe5-lab/quant-agent:latest

            # Cleanup transit VPS temp file
            ssh -o StrictHostKeyChecking=no -i $TRANSIT_KEY_FILE ${TRANSIT_USER}@38.60.126.42 "rm -f /tmp/${TARGET_TAG}.tar.gz"
            rm -f $TRANSIT_KEY_FILE

            echo "Starting services..."
            sudo COMPOSE_PROFILES=$PROFILES docker compose up -d --remove-orphans

            echo "Waiting for health check (30s)..."
            sleep 30

            HEALTH=$(curl -sf --max-time 10 http://localhost:8000/api/v1/health 2>/dev/null || echo "UNHEALTHY")
            if [ "$HEALTH" = "UNHEALTHY" ]; then
              echo "Health check FAILED"
              sudo COMPOSE_PROFILES=$PROFILES docker compose logs --tail 30
              exit 1
            fi

            echo "$TARGET_TAG" > $DEPLOY_PATH/.deployed_sha
            sudo docker logout ghcr.io
            sudo docker image prune -f
            echo "Master deploy OK (tag: $TARGET_TAG)"

  # ==========================================
  # Stage 4: Deploy Slaves (via Master jump host)
  # ==========================================
  deploy_slaves:
    name: Deploy Slaves
    runs-on: ubuntu-latest
    needs: [deploy_master]
    if: |
      always() &&
      needs.deploy_master.result == 'success'
    continue-on-error: true
    env:
      S1_HOST: ${{ secrets.VPS_S1_HOST }}
      S1_USER: ${{ secrets.VPS_S1_USER }}
      S1_KEY: ${{ secrets.VPS_S1_SSH_KEY }}
      S2_HOST: ${{ secrets.VPS_S2_HOST }}
      S2_USER: ${{ secrets.VPS_S2_USER }}
      S2_KEY: ${{ secrets.VPS_S2_SSH_KEY }}
      S3_HOST: ${{ secrets.VPS_S3_HOST }}
      S3_USER: ${{ secrets.VPS_S3_USER }}
      S3_KEY: ${{ secrets.VPS_S3_SSH_KEY }}
      S4_HOST: ${{ secrets.VPS_S4_HOST }}
      S4_USER: ${{ secrets.VPS_S4_USER }}
      S4_KEY: ${{ secrets.VPS_S4_SSH_KEY }}

    steps:
      - uses: actions/checkout@v4

      # Encode compose file once for all slaves
      - name: Prepare compose file (base64)
        id: prepare_compose
        run: |
          echo "b64=$(base64 -w0 docker-compose.yml)" >> $GITHUB_OUTPUT

      - name: Deploy all slaves via Master
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: S1_HOST,S1_USER,S1_KEY,S2_HOST,S2_USER,S2_KEY,S3_HOST,S3_USER,S3_KEY,S4_HOST,S4_USER,S4_KEY,GITHUB_ACTOR
          command_timeout: 60m
          script: |
            set -e
            DEPLOY_PATH=/opt/quant-agent
            TARGET_TAG="${{ needs.deploy_master.outputs.image_tag }}"
            COMPOSE_B64='${{ steps.prepare_compose.outputs.b64 }}'
            GHCR_TOKEN='${{ secrets.GITHUB_TOKEN }}'

            # Write slave SSH keys
            mkdir -p ~/.ssh
            echo "$S1_KEY" > ~/.ssh/slave_1
            echo "$S2_KEY" > ~/.ssh/slave_2
            echo "$S3_KEY" > ~/.ssh/slave_3
            echo "$S4_KEY" > ~/.ssh/slave_4
            chmod 600 ~/.ssh/slave_*

            # Write compose file to /tmp for SCP to slaves
            echo "$COMPOSE_B64" | base64 -d > /tmp/docker-compose.yml
            sudo sed -i "s|ghcr.io/songlinhe5-lab/quant-agent:.*|ghcr.io/songlinhe5-lab/quant-agent:${TARGET_TAG}|g" /tmp/docker-compose.yml

            deploy_slave() {
              local NAME=$1 IP=$2 USER=$3 KEY=$4
              echo ""
              echo "========== Deploying $NAME ($IP) =========="

              # SCP compose file to slave (.env is manually configured on each slave)
              echo "Transferring compose file to $NAME..."
              scp -i ~/.ssh/$KEY -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
                /tmp/docker-compose.yml $USER@$IP:/tmp/ || { echo "SCP failed"; return 1; }

              # Remote deploy (pull from GHCR directly for overseas slaves)
              ssh -i ~/.ssh/$KEY -o StrictHostKeyChecking=no -o ConnectTimeout=10 $USER@$IP bash -s <<REMOTE
            set -e
            DEPLOY_PATH=/opt/quant-agent
            mkdir -p \$DEPLOY_PATH
            cd \$DEPLOY_PATH

            # Write compose file (from /tmp, preserves .env-safe dollar syntax)
            cp docker-compose.yml docker-compose.yml.bak 2>/dev/null || true
            sudo cp /tmp/docker-compose.yml docker-compose.yml
            sudo chown \$(whoami):\$(whoami) docker-compose.yml
            rm -f /tmp/docker-compose.yml

            # .env is manually configured on each slave, CI does not touch it
            if [ ! -f .env ]; then
              echo "ERROR: .env not found! Please manually create /opt/quant-agent/.env"
              exit 1
            fi
            echo ".env found, using manual per-node config"

            # GHCR login and pull (overseas slaves have fast access to GHCR)
            echo "${GHCR_TOKEN}" | sudo docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin 2>/dev/null
            echo "Pulling image ${TARGET_TAG} from GHCR..."
            sudo COMPOSE_PROFILES=slave docker compose pull

            echo "Starting slave..."
            sudo COMPOSE_PROFILES=slave docker compose up -d --remove-orphans

            # Wait for healthy with retries (up to 90 seconds)
            echo "Waiting for health check..."
            for i in 1 2 3 4 5 6; do
              sleep 15
              HEALTH=\$(curl -sf --max-time 10 http://localhost:8001/health 2>/dev/null || echo UNHEALTHY)
              if [ "\$HEALTH" != "UNHEALTHY" ]; then
                echo "Health check passed on attempt \$i"
                break
              fi
              echo "Attempt \$i/6 failed, retrying..."
              if [ "\$i" = "6" ]; then
                echo "Health check failed after 6 attempts (90s)"
                sudo COMPOSE_PROFILES=slave docker compose logs --tail 30
                exit 1
              fi
            done
            echo "${TARGET_TAG}" | sudo tee \$DEPLOY_PATH/.deployed_sha > /dev/null
            sudo docker logout ghcr.io 2>/dev/null || true
            sudo docker image prune -f
            echo "Deploy OK"
            REMOTE
              echo "$NAME done"
            }

            deploy_slave "Slave-1" "$S1_HOST" "$S1_USER" "slave_1"
            deploy_slave "Slave-2" "$S2_HOST" "$S2_USER" "slave_2"
            deploy_slave "Slave-3" "$S3_HOST" "$S3_USER" "slave_3"
            deploy_slave "Slave-4" "$S4_HOST" "$S4_USER" "slave_4"

            # Cleanup temporary files
            rm -f ~/.ssh/slave_* /tmp/docker-compose.yml
            echo "All slaves deployed"

  # ==========================================
  # Deploy Summary
  # ==========================================
  deploy_summary:
    name: Deploy Summary
    runs-on: ubuntu-latest
    needs: [deploy_master, deploy_slaves]
    if: always() && needs.deploy_master.result != 'skipped'
    steps:
      - name: Generate summary
        run: |
          echo "## Deploy Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Node | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Master | ${{ needs.deploy_master.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Slaves | ${{ needs.deploy_slaves.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event.inputs.rollback_sha }}" != "" ]; then
            echo "**Rollback** to SHA: ${{ github.event.inputs.rollback_sha }}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.deploy_master.result }}" = "failure" ]; then
            echo "Master deploy failed - check logs"
            exit 1
          fi
