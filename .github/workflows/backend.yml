name: Backend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: 'Commit SHA to rollback to (leave empty for normal deploy)'
        required: false
        type: string

env:
  GHCR_IMAGE: ghcr.io/songlinhe5-lab/quant-agent
  UV_HTTP_TIMEOUT: 300

permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # Stage 0: Branch Protection Check (Free Tier Workaround)
  # ==========================================
  enforce_branch_policy:
    name: Enforce develop→main Flow
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'Merge pull request')
    steps:
      - name: Block direct push to main
        run: |
          echo "ERROR: Direct push to main is NOT allowed!"
          echo ""
          echo "Please follow the correct workflow:"
          echo "  1. Push your changes to the 'develop' branch"
          echo "  2. Create a Pull Request: develop → main"
          echo "  3. Wait for CI checks to pass"
          echo "  4. Merge the PR into main"
          exit 1

  # ==========================================
  # Stage 1: CI Quality Gates
  # ==========================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: [enforce_branch_policy]
    if: always() && needs.enforce_branch_policy.result == 'skipped'
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            uv sync --all-extras && break
            echo "uv sync failed (attempt $i), retrying in 10s..."
            sleep 10
          done
      - name: Ruff lint
        run: uv run ruff check backend/
      - name: Ruff format check
        run: uv run ruff format --check backend/

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: [lint, enforce_branch_policy]
    if: always() && (needs.lint.result == 'success' || needs.lint.result == 'skipped')

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            uv sync --all-extras && break
            echo "uv sync failed (attempt $i), retrying in 10s..."
            sleep 10
          done
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          INTERNAL_API_SECRET: test-secret-key
          EMBEDDING_API_KEY: test-key
          EMBEDDING_BASE_URL: https://api.test.com
          EMBEDDING_MODEL: BAAI/bge-large-zh-v1.5
        run: |
          uv run pytest backend/tests/ -v \
            --timeout=60 --timeout-method=thread \
            --cov=backend --cov-report=xml:coverage.xml --cov-report=term-missing \
            --cov-fail-under=70
      - name: Detect slow tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          INTERNAL_API_SECRET: test-secret-key
          EMBEDDING_API_KEY: test-key
          EMBEDDING_BASE_URL: https://api.test.com
          EMBEDDING_MODEL: BAAI/bge-large-zh-v1.5
        run: |
          echo "## Slow Tests Report (Top 20)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          uv run pytest backend/tests/ --durations=20 --tb=no -q 2>&1 | tee /tmp/slow_tests.txt
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/slow_tests.txt | grep -A 30 "slowest" >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
        if: always()
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [test, enforce_branch_policy]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            uv sync --all-extras && break
            echo "uv sync failed (attempt $i), retrying in 10s..."
            sleep 10
          done
      - name: pip-audit vulnerability scan
        run: uv run pip-audit --desc --require-hashes 2>&1 || true
        continue-on-error: true

  # ==========================================
  # Stage 2: Build & Push to GHCR
  # ==========================================
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: |
      always() &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       (github.event_name == 'workflow_dispatch' && !inputs.rollback_sha)) &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.security.result == 'success' || needs.security.result == 'skipped')
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # Stage 3: Deploy to VPS (美国主节点 + 北京数据节点)
  # ==========================================
  # Secrets: VPS_S1_HOST / VPS_S1_USER / VPS_S1_SSH_KEY (美国主节点)
  # Secrets: VPS_HOST / VPS_USER / VPS_SSH_KEY (北京数据节点)
  # ==========================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      always() &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       github.event_name == 'workflow_dispatch') &&
      needs.build.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Set target image tag
        id: set_tag
        run: |
          if [ -n "${{ inputs.rollback_sha }}" ]; then
            TAG="sha-${{ inputs.rollback_sha }}"
          else
            TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying image tag: $TAG"

      - name: Prepare compose file (base64)
        id: prepare_compose
        run: |
          echo "compose_b64=$(base64 -w0 docker-compose.yml)" >> $GITHUB_OUTPUT

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_S1_HOST }}
          username: ${{ secrets.VPS_S1_USER }}
          key: ${{ secrets.VPS_S1_SSH_KEY }}
          envs: GITHUB_ACTOR
          command_timeout: 30m
          script: |
            set -e
            DEPLOY_PATH=/opt/quant-agent
            TARGET_TAG="${{ steps.set_tag.outputs.tag }}"

            mkdir -p $DEPLOY_PATH
            cd $DEPLOY_PATH

            # 更新 compose 文件中的镜像 tag
            echo '${{ steps.prepare_compose.outputs.compose_b64 }}' | base64 -d > docker-compose.yml
            sed -i "s|ghcr.io/songlinhe5-lab/quant-agent:.*|ghcr.io/songlinhe5-lab/quant-agent:${TARGET_TAG}|g" docker-compose.yml

            # 检查 .env 存在
            if [ ! -f .env ]; then
              echo "ERROR: .env not found! Please create /opt/quant-agent/.env"
              exit 1
            fi

            # 拉取新镜像
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            docker pull ghcr.io/songlinhe5-lab/quant-agent:${TARGET_TAG}

            # 启动服务
            docker compose -f docker-compose.yml up -d --remove-orphans

            # 健康检查 (最多 90s)
            for i in 1 2 3 4 5 6; do
              sleep 15
              HEALTH=$(curl -sf --max-time 10 http://localhost:8000/api/v1/health 2>/dev/null || echo "UNHEALTHY")
              if [ "$HEALTH" != "UNHEALTHY" ]; then
                echo "Health check passed on attempt $i"
                break
              fi
              echo "Attempt $i/6 failed, retrying..."
              if [ "$i" = "6" ]; then
                echo "Health check FAILED after 6 attempts (90s)"
                docker compose -f docker-compose.yml logs --tail 50
                docker logout ghcr.io
                exit 1
              fi
            done

            # 清理
            echo "$TARGET_TAG" > $DEPLOY_PATH/.deployed_sha
            docker logout ghcr.io
            docker image prune -f
            echo "Deploy OK (tag: $TARGET_TAG)"

      - name: Deploy summary
        if: always()
        run: |
          echo "## Deploy Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ env.GHCR_IMAGE }}:${{ steps.set_tag.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | ${{ secrets.VPS_S1_HOST }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.rollback_sha }}" != "" ]; then
            echo "| Rollback | ${{ inputs.rollback_sha }} |" >> $GITHUB_STEP_SUMMARY
          fi

  # ==========================================
  # Stage 4: Deploy to Beijing VPS (数据节点)
  # ==========================================
  # 北京 VPS 仅运行 AKShare + YFinance 采集器
  # Secrets: VPS_S2_HOST / VPS_S2_USER / VPS_S2_SSH_KEY
  # Compose: docker-compose.slave.yml
  # ==========================================
  deploy_beijing:
    name: Deploy to Beijing VPS (Data Node)
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      always() &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       github.event_name == 'workflow_dispatch') &&
      needs.build.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Set target image tag
        id: set_tag
        run: |
          if [ -n "${{ inputs.rollback_sha }}" ]; then
            TAG="sha-${{ inputs.rollback_sha }}"
          else
            TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying image tag: $TAG to Beijing VPS"

      - name: Prepare compose file (base64)
        id: prepare_compose
        run: |
          echo "compose_b64=$(base64 -w0 docker-compose.slave.yml)" >> $GITHUB_OUTPUT

      - name: Deploy to Beijing VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GITHUB_ACTOR
          command_timeout: 15m
          script: |
            set -e
            DEPLOY_PATH=/opt/quant-agent
            TARGET_TAG="${{ steps.set_tag.outputs.tag }}"

            mkdir -p $DEPLOY_PATH
            cd $DEPLOY_PATH

            # 更新 compose 文件中的镜像 tag
            echo '${{ steps.prepare_compose.outputs.compose_b64 }}' | base64 -d > docker-compose.slave.yml
            sed -i "s|ghcr.io/songlinhe5-lab/quant-agent:.*|ghcr.io/songlinhe5-lab/quant-agent:${TARGET_TAG}|g" docker-compose.slave.yml

            # 检查 .env.slave 存在
            if [ ! -f .env.slave ]; then
              echo "ERROR: .env.slave not found! Please create /opt/quant-agent/.env.slave"
              exit 1
            fi

            # 拉取新镜像
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            docker pull ghcr.io/songlinhe5-lab/quant-agent:${TARGET_TAG}

            # 启动数据节点
            docker compose -f docker-compose.slave.yml up -d --remove-orphans

            # 健康检查 (进程存活，最多 60s)
            for i in 1 2 3 4; do
              sleep 15
              if docker ps --filter name=quant_data_worker --filter status=running | grep -q quant_data_worker; then
                echo "Data worker is running (attempt $i)"
                break
              fi
              echo "Attempt $i/4: data worker not running yet..."
              if [ "$i" = "4" ]; then
                echo "Data worker FAILED to start"
                docker compose -f docker-compose.slave.yml logs --tail 50
                docker logout ghcr.io
                exit 1
              fi
            done

            # 清理
            echo "$TARGET_TAG" > $DEPLOY_PATH/.deployed_sha
            docker logout ghcr.io
            docker image prune -f
            echo "Beijing Deploy OK (tag: $TARGET_TAG)"

      - name: Deploy summary
        if: always()
        run: |
          echo "## Beijing VPS Deploy Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ needs.deploy_beijing.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ env.GHCR_IMAGE }}:${{ steps.set_tag.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | Beijing VPS (${{ secrets.VPS_HOST }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Role | Data Node (AKShare + YFinance) |" >> $GITHUB_STEP_SUMMARY
