# Alembic 数据库迁移配置（BE-07）
# 用法：
#   alembic revision --autogenerate -m "描述"
#   alembic upgrade head
#   alembic downgrade -1

[alembic]
# 迁移脚本目录
script_location = backend/alembic

# 数据库连接 URL（运行时由 env.py 动态注入，此处仅作占位）
sqlalchemy.url = sqlite:///./quant_agent.db

# 迁移文件模板
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# 时区
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
