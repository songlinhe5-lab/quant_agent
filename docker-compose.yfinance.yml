# ==========================================
# 🌏 YFinance 独立数据采集节点 - 专用 Compose
# ==========================================
# 用法:
#   docker compose -f docker-compose.yfinance.yml up -d
#   docker compose -f docker-compose.yfinance.yml logs -f
#   docker compose -f docker-compose.yfinance.yml down
#
# 仅启动 Redis + YFinance Worker，轻量级 (~150MB 内存)
# 多 VPS 部署时，所有节点共享同一个 Redis (通过环境变量配置外部 Redis)
# 内置分布式锁，多节点同时运行仅一个实际执行拉取
# ==========================================

services:
  # 本地 Redis (如果不使用外部 Redis)
  # 若使用外部 Redis (如北京节点的)，注释掉此服务并修改 REDIS_HOST
  redis:
    image: redis:7-alpine
    container_name: quant_yf_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-quant_redis_secret_2026}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-quant_redis_secret_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 64M

  yfinance-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quant_yfinance
    command: python backend/yfinance_worker.py
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - NODE_ROLE=yfinance
      - QUANT_ENV=production
    volumes:
      - ./backend:/app/backend
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f yfinance_worker || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M

volumes:
  redis_data:
    name: quant_yf_redis_data
